<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ICS Calendar Viewer social preview</title>
  <desc id="desc">Read-only local ICS event inspection with source fallback.</desc>
  <rect width="1280" height="640" fill="#0f172a"/>
  <rect x="72" y="72" width="1136" height="496" rx="28" fill="#f8fafc"/>
  <text x="128" y="184" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900">ICS Calendar Viewer</text>
  <text x="132" y="240" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="28">Open local .ics files without sync, import, or write-back.</text>
  <g transform="translate(132 318)">
    <rect width="1016" height="148" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="28" y="28" width="142" height="92" rx="14" fill="#dbeafe"/>
    <text x="62" y="66" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">JUN</text>
    <text x="70" y="104" fill="#1e3a8a" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">08</text>
    <text x="214" y="66" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Read-only event inspection</text>
    <text x="214" y="108" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="22">Events, timezones, recurrence warnings, and raw source.</text>
  </g>
  <text x="132" y="520" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">ics-calendar-viewer</text>
</svg>
